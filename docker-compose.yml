name: justlife-platform-local

services:
  postgres-professionals:
    image: postgres:latest
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${PROFESSIONALS_DB}
    ports:
      - "5433:5432"
    volumes:
      - pg_prof_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${PROFESSIONALS_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  postgres-bookings:
    image: postgres:latest
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${BOOKINGS_DB}
    ports:
      - "5434:5432"
    volumes:
      - pg_book_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${BOOKINGS_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:latest
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  kafka:
    image: apache/kafka:latest
    ports:
      - "${KAFKA_HOST_PORT}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://:${KAFKA_INTERNAL_PORT},PLAINTEXT_HOST://:9092,CONTROLLER://:${KAFKA_CONTROLLER_PORT}"
      # Internal for containers, host for local clients
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:${KAFKA_INTERNAL_PORT},PLAINTEXT_HOST://localhost:${KAFKA_HOST_PORT}"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:${KAFKA_CONTROLLER_PORT}"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:${KAFKA_INTERNAL_PORT} --list > /dev/null 2>&1 || exit 1" ]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 20s

  kafka-init:
    image: confluentinc/cp-kafka:latest
    depends_on:
      - kafka
    entrypoint:
      - bash
      - -lc
      - |
        echo "===== kafka-init starting ====="
        echo "Waiting for Kafka to start..."
        sleep 20
        echo "Creating topic ${KAFKA_TOPIC_BOOKING_EVENTS}..."
        kafka-topics --create --if-not-exists           --topic ${KAFKA_TOPIC_BOOKING_EVENTS}           --bootstrap-server kafka:${KAFKA_INTERNAL_PORT}           --partitions 1           --replication-factor 1
        echo "Done creating topic ${KAFKA_TOPIC_BOOKING_EVENTS}."
        echo "Creating topic ${KAFKA_TOPIC_BOOKING_EVENTS_DLT} (DLQ)..."
        kafka-topics --create --if-not-exists           --topic ${KAFKA_TOPIC_BOOKING_EVENTS_DLT}           --bootstrap-server kafka:${KAFKA_INTERNAL_PORT}           --partitions 1           --replication-factor 1
        echo "Done creating topic ${KAFKA_TOPIC_BOOKING_EVENTS_DLT}."
        echo "Sleeping before exit..."
        sleep 10
        echo "===== kafka-init finished ====="

  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    depends_on:
      - kafka
    ports:
      - "${KAFDROP_PORT}:9000"
    environment:
      KAFKA_BROKERCONNECT: "kafka:${KAFKA_INTERNAL_PORT}"
      SERVER_PORT: 9000
      JVM_OPTS: "-Xms32M -Xmx256M"

  zipkin:
    image: openzipkin/zipkin:latest
    ports:
      - "${ZIPKIN_PORT}:9411"

  sonarqube-db:
    image: postgres:latest
    environment:
      POSTGRES_USER: ${SONAR_DB_USER}
      POSTGRES_PASSWORD: ${SONAR_DB_PASSWORD}
      POSTGRES_DB: ${SONAR_DB}
    volumes:
      - sonar_db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SONAR_DB_USER} -d ${SONAR_DB}"]
      interval: 10s
      timeout: 5s
      retries: 20

  sonarqube:
    image: sonarqube:latest
    depends_on:
      sonarqube-db:
        condition: service_healthy
    ports:
      - "${SONAR_PORT}:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/${SONAR_DB}
      SONAR_JDBC_USERNAME: ${SONAR_DB_USER}
      SONAR_JDBC_PASSWORD: ${SONAR_DB_PASSWORD}
    volumes:
      - sonar_data:/opt/sonarqube/data
      - sonar_extensions:/opt/sonarqube/extensions
      - sonar_logs:/opt/sonarqube/logs

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - ./docker/prometheus/prometheus-local.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  config-server:
    build: ./config-server
    environment:
      SPRING_PROFILES_ACTIVE: native
      CONFIG_REPO_PATH: /config-repo
      ZIPKIN_ENDPOINT: ${ZIPKIN_ENDPOINT}
      TRACING_SAMPLING_PROBABILITY: ${TRACING_SAMPLING_PROBABILITY}
    volumes:
      - ./config-repo:/config-repo:ro
    ports:
      - "8888:8888"
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8888'" ]
      interval: 5s
      timeout: 5s
      retries: 30
    depends_on:
      zipkin:
        condition: service_started

  discovery-server:
    build: ./discovery-server
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_DEFAULTZONE: http://discovery-server:8761/eureka/
      ZIPKIN_ENDPOINT: ${ZIPKIN_ENDPOINT}
      TRACING_SAMPLING_PROBABILITY: ${TRACING_SAMPLING_PROBABILITY}
    ports:
      - "8761:8761"
    depends_on:
      config-server:
        condition: service_healthy

  api-gateway:
    build: ./api-gateway
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_DEFAULTZONE: http://discovery-server:8761/eureka/
      ZIPKIN_ENDPOINT: ${ZIPKIN_ENDPOINT}
      TRACING_SAMPLING_PROBABILITY: ${TRACING_SAMPLING_PROBABILITY}
    ports:
      - "8080:8080"
    depends_on:
      discovery-server:
        condition: service_started

  professional-service:
    build:
      context: .
      dockerfile: professional-service/Dockerfile
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_DEFAULTZONE: http://discovery-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-professionals:5432/${PROFESSIONALS_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:${KAFKA_INTERNAL_PORT}
      ZIPKIN_ENDPOINT: ${ZIPKIN_ENDPOINT}
      TRACING_SAMPLING_PROBABILITY: ${TRACING_SAMPLING_PROBABILITY}
    ports:
      - "8081:8081"
    depends_on:
      postgres-professionals:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_started
      discovery-server:
        condition: service_started

  booking-service:
    build:
      context: .
      dockerfile: booking-service/Dockerfile
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_DEFAULTZONE: http://discovery-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-bookings:5432/${BOOKINGS_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:${KAFKA_INTERNAL_PORT}
      ZIPKIN_ENDPOINT: ${ZIPKIN_ENDPOINT}
      TRACING_SAMPLING_PROBABILITY: ${TRACING_SAMPLING_PROBABILITY}
    ports:
      - "8082:8082"
    depends_on:
      postgres-bookings:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_started
      discovery-server:
        condition: service_started

volumes:
  pg_prof_data:
  pg_book_data:
  grafana_data:
  sonar_data:
  sonar_extensions:
  sonar_logs:
  sonar_db_data:
