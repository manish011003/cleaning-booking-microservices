name: CI/CD Pipeline for Booking Service

on:
  workflow_run:
    workflows: ["CI/CD Pipeline for Discovery Server"]
    branches: ["main"]
    types:
      - completed

permissions:
  contents: read

jobs:
  test:
    name: Test Booking Service
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
          cache-dependency-path: |
            common/pom.xml
            booking-service/pom.xml

      - name: Install common module
        run: mvn -B -f common/pom.xml clean install -DskipTests

      - name: Run booking-service tests
        run: mvn -B -f booking-service/pom.xml clean verify

  build-and-push:
    name: Build & Push Booking Service Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
          cache-dependency-path: |
            common/pom.xml
            booking-service/pom.xml

      - name: Install common module
        run: mvn -B -f common/pom.xml clean install -DskipTests

      - name: Package booking-service
        run: mvn -B -f booking-service/pom.xml clean package -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./booking-service/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/cleaning-booking-microservices-booking-service:latest