global:
  scrape_interval: 5s
  evaluation_interval: 5s

# For "local" mode (docker-local-compose.yml):
# - Spring Boot apps run on your host (IDE)
# - Prometheus runs in Docker and scrapes the host via host.docker.internal

scrape_configs:
  - job_name: 'config-server'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8888']

  - job_name: 'discovery-server'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8761']

  - job_name: 'api-gateway'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8080']

  - job_name: 'professionals-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8081']

  - job_name: 'booking-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8082']